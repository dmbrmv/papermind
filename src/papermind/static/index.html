<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperMind</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0E8;--bg2:#EDE8DD;--bg3:#E3DDD1;
  --fg:#2D2B27;--fg2:#6B6560;--accent:#C96B2E;--accent2:#1A5276;
  --border:#D4CFC5;--hover:#E8E2D6;--card:#FFFFFF;
  --serif:'Crimson Pro',Georgia,serif;
  --body:'Source Serif 4','Crimson Pro',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:var(--body);background:var(--bg);color:var(--fg);line-height:1.75;height:100vh;font-size:19px;-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:auto 1fr;height:100vh}

header{grid-column:1/-1;padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;background:var(--bg2)}
header h1{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--accent);letter-spacing:1px}
header .stats{font-family:var(--mono);font-size:14px;color:var(--fg2);margin-left:auto}

.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:24px 20px;overflow-y:auto}
.sidebar h3{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--fg2);margin:24px 0 12px;font-weight:500}
.topic{display:block;padding:8px 14px;font-size:18px;color:var(--fg2);cursor:pointer;border-radius:6px;border:none;background:none;width:100%;text-align:left;font-family:var(--body);transition:all .12s}
.topic:hover,.topic.active{background:var(--hover);color:var(--fg)}
.topic.active{border-left:3px solid var(--accent);padding-left:11px;color:var(--accent);font-weight:600}
.topic .count{float:right;font-family:var(--mono);font-size:14px;color:var(--fg2)}
.nav-btn{display:block;padding:10px 14px;font-size:18px;color:var(--fg2);cursor:pointer;border-radius:6px;border:none;background:none;width:100%;text-align:left;font-family:var(--body);transition:all .12s}
.nav-btn:hover{background:var(--hover);color:var(--fg)}
.nav-btn.active{color:var(--accent);font-weight:600}

main{overflow-y:auto;padding:32px 40px;max-height:calc(100vh - 60px)}
.search-bar{display:flex;gap:10px;margin-bottom:28px}
.search-bar input,.search-bar textarea{flex:1;background:var(--card);border:1px solid var(--border);color:var(--fg);padding:14px 18px;font-family:var(--body);font-size:18px;border-radius:8px;outline:none;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.search-bar input:focus,.search-bar textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,107,46,.12)}
.search-bar button{background:var(--accent);color:#fff;border:none;padding:14px 24px;font-family:var(--mono);font-size:14px;border-radius:8px;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;font-weight:500;transition:background .15s}
.search-bar button:hover{background:#B55E24}

.paper-item{padding:18px 20px;border-radius:8px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;margin-bottom:2px}
.paper-item:hover{background:var(--card);border-left-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.paper-item .title{font-family:var(--serif);font-size:21px;font-weight:600;margin-bottom:6px;color:var(--fg)}
.paper-item .meta{font-family:var(--mono);font-size:13px;color:var(--fg2)}
.paper-item .meta span{margin-right:14px}

.detail{max-width:760px}
.detail .back{font-family:var(--mono);font-size:13px;color:var(--fg2);cursor:pointer;margin-bottom:20px;display:inline-block;border:none;background:none;transition:color .1s}
.detail .back:hover{color:var(--accent)}
.detail h2{font-family:var(--serif);font-size:32px;font-weight:700;line-height:1.3;margin-bottom:14px;color:var(--fg)}
.detail .abstract{font-style:italic;color:var(--fg);margin-bottom:24px;padding:20px 24px;background:var(--card);border-radius:8px;border-left:4px solid var(--accent);font-size:18px;line-height:1.8;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.detail .content{font-size:18px;line-height:1.85;color:var(--fg)}
.detail .content h1,.detail .content h2,.detail .content h3{font-family:var(--serif);color:var(--fg);margin:28px 0 12px;font-weight:600}
.detail .content h1{font-size:26px} .detail .content h2{font-size:22px} .detail .content h3{font-size:19px}
.detail .content p{margin:10px 0}
.detail .content ul,.detail .content ol{margin:10px 0 10px 28px}
.detail .content code{font-family:var(--mono);background:var(--bg3);padding:3px 7px;border-radius:4px;font-size:15px}
.detail .content pre{background:var(--bg2);padding:16px;border-radius:8px;overflow-x:auto;margin:16px 0;border:1px solid var(--border)}
.detail .content table{border-collapse:collapse;margin:16px 0;width:100%}
.detail .content th,.detail .content td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:16px}
.detail .content th{background:var(--bg3);font-weight:600}
.detail .content blockquote{border-left:4px solid var(--accent);padding:8px 16px;color:var(--fg2);margin:12px 0;background:var(--card);border-radius:0 8px 8px 0}
.detail .content img{max-width:100%;border-radius:6px}
.eq-item{font-size:18px;padding:18px 22px;background:var(--card);border-radius:8px;margin:8px 0;overflow-x:auto;color:var(--fg);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}

.session-item{padding:16px 20px;background:var(--card);border-radius:8px;margin:10px 0;border-left:4px solid var(--accent2);box-shadow:0 1px 3px rgba(0,0,0,.04);font-size:18px}
.explain-box{margin-top:28px;padding:28px;background:var(--card);border-radius:10px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.explain-box h3{font-family:var(--serif);font-size:26px;color:var(--accent);margin-bottom:14px;font-weight:700}
.explain-box .range{font-family:var(--mono);font-size:16px;color:var(--accent2);margin-top:12px}
.explain-box .ref{font-size:15px;color:var(--fg2);margin-top:12px;font-style:italic}

@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  main{padding:20px}
}
.empty{text-align:center;padding:80px 20px;color:var(--fg2);font-style:italic;font-size:18px}
.loading{text-align:center;padding:60px;color:var(--fg2);font-family:var(--mono);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>PaperMind</h1>
    <div class="stats" id="header-stats"></div>
  </header>
  <div class="sidebar">
    <h3>Views</h3>
    <button class="nav-btn active" data-view="browse">Browse Papers</button>
    <button class="nav-btn" data-view="cite">Cite</button>
    <button class="nav-btn" data-view="sessions">Sessions</button>
    <button class="nav-btn" data-view="explain">Explain</button>
    <h3>Topics</h3>
    <div id="topic-list"></div>
  </div>
  <main id="main"></main>
</div>
<script>
const API='/api/v1';
let currentTopic='',topics={},previousView=null,previousQuery=null;

function renderMarkdown(text){
  if(typeof marked!=='undefined'){
    let html=marked.parse(text);
    // Make DOIs clickable
    html=html.replace(
      /(10\.\d{4,9}\/[-._;()\/:A-Za-z0-9]+)/g,
      '<a href="https://doi.org/$1" target="_blank" style="color:var(--accent2)">doi:$1</a>'
    );
    // Make citations clickable — only inside parentheses or with "et al."
    // Pattern 1: (Author Year) or (Author et al. Year) — inside parens
    html=html.replace(
      /\(([^)]{3,80})\)/g,
      function(match,inner){
        // Only process if it looks like citations (has Author Year pattern)
        if(!/[A-Z][a-z]+[,\s]+\d{4}/.test(inner))return match;
        // Skip if it's clearly not a citation (has =, +, *, numbers only)
        if(/[=+*\/]/.test(inner))return match;
        // Link each author-year pair inside
        const linked=inner.replace(
          /([A-Z][a-z]+(?:\s+(?:et\s+al\.?|and\s+[A-Z][a-z]+(?:\s+[A-Z][a-z]+)?))?)[,\s]+(\d{4})/g,
          function(m,author,year){
            const q=author.trim()+' '+year;
            return '<a href="#" class="cite-link" data-query="'+q+'" style="cursor:pointer;text-decoration:underline;text-decoration-style:dotted;color:var(--accent2)">'+m+'</a>';
          }
        );
        return '('+linked+')';
      }
    );
    return html;
  }
  const d=document.createElement('div');
  d.textContent=text;
  return '<pre style="white-space:pre-wrap">'+d.innerHTML+'</pre>';
}

// Color-code citation links: orange=in KB, blue=search
async function colorCitations(container){
  const links=container.querySelectorAll('.cite-link');
  if(!links.length)return;
  // Batch: search each unique query
  const queries=new Map();
  for(const link of links){
    const q=link.dataset.query||'';
    if(!queries.has(q))queries.set(q,[]);
    queries.get(q).push(link);
  }
  for(const [q,qlinks] of queries){
    try{
      const data=await api('/search/scan?q='+encodeURIComponent(q)+'&limit=1');
      const results=data.results||[];
      const found=results.length>0&&results[0].score>0.3;
      for(const link of qlinks){
        if(found){
          link.style.color='var(--accent)';
          link.style.fontWeight='600';
          link.dataset.paperId=results[0].id||'';
          link.title='Found in KB (score: '+(results[0].score||0).toFixed(2)+') — click to open';
        }else{
          link.style.color='var(--accent2)';
          link.title='Not in KB — click to search';
        }
      }
    }catch(e){
      for(const link of qlinks){
        link.style.color='var(--accent2)';
      }
    }
  }
}

// Wire citation clicks globally
document.addEventListener('click',function(e){
  const link=e.target.closest('.cite-link');
  if(!link)return;
  e.preventDefault();
  const paperId=link.dataset.paperId;
  if(paperId){
    // In KB — open directly
    showPaper(paperId);
  }else{
    // Not in KB — search
    const query=link.dataset.query;
    if(query){
      previousView='browse';
      loadPapers(query);
      setActiveNav('browse');
    }
  }
});

function renderLatexInElement(el){
  if(typeof renderMathInElement!=='undefined'){
    renderMathInElement(el,{
      delimiters:[
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false},
        {left:'\\(',right:'\\)',display:false},
        {left:'\\[',right:'\\]',display:true},
      ],
      throwOnError:false
    });
  }
}

function normalizeTitle(s){
  if(!s)return'Untitled';
  const upper=s.replace(/[^A-Za-z]/g,'').split('').filter(c=>c===c.toUpperCase()&&c!==c.toLowerCase()).length;
  const alpha=s.replace(/[^A-Za-z]/g,'').length;
  if(alpha>0&&upper/alpha>0.6){
    return s.toLowerCase().replace(/(?:^|\s|[-/])\S/g,c=>c.toUpperCase());
  }
  return s;
}

function esc(s){
  if(!s)return '';
  const d=document.createElement('div');
  d.textContent=String(s);
  return d.innerHTML;
}

function setHTML(el,html){
  if(typeof el==='string')el=document.getElementById(el);
  el.innerHTML='';
  const t=document.createElement('template');
  t.innerHTML=html;
  el.appendChild(t.content.cloneNode(true));
}

async function api(path,opts){
  const r=await fetch(API+path,opts);
  if(!r.ok)throw new Error(r.statusText);
  return r.json();
}

async function init(){
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.addEventListener('click',()=>showView(b.dataset.view));
  });
  const[stats]=await Promise.all([api('/stats')]);
  topics=stats.topics||{};
  document.getElementById('header-stats').textContent=
    `${stats.papers} papers \u00b7 ${stats.packages} packages \u00b7 ${stats.codebases} codebases`;
  renderTopics();
  showView('browse');
}

function renderTopics(){
  const el=document.getElementById('topic-list');
  el.textContent='';
  Object.entries(topics).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{
    const btn=document.createElement('button');
    btn.className='topic'+(currentTopic===t?' active':'');
    btn.textContent=t;
    const span=document.createElement('span');
    span.className='count';
    span.textContent=c;
    btn.appendChild(span);
    btn.addEventListener('click',()=>{
      currentTopic=currentTopic===t?'':t;
      renderTopics();
      loadPapers();
    });
    el.appendChild(btn);
  });
}

function setActiveNav(view){
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.view===view);
  });
}

async function showView(view){
  setActiveNav(view);
  history.pushState({view:view},'',`#${view}`);
  if(view==='browse')await loadPapers();
  else if(view==='cite')showCiteView();
  else if(view==='sessions')await loadSessions();
  else if(view==='explain')showExplainView();
}

// Browser back/forward
window.addEventListener('popstate',function(e){
  if(e.state&&e.state.view){
    setActiveNav(e.state.view);
    if(e.state.view==='browse')loadPapers(e.state.query);
    else if(e.state.view==='cite')showCiteView();
    else if(e.state.view==='sessions')loadSessions();
    else if(e.state.view==='explain')showExplainView();
  }else if(e.state&&e.state.paper){
    showPaperNoHistory(e.state.paper);
  }
});

async function loadPapers(query){
  const m=document.getElementById('main');
  m.textContent='';

  const bar=document.createElement('div');
  bar.className='search-bar';
  const input=document.createElement('input');
  input.id='q';input.placeholder='Search papers...';
  input.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  const btn=document.createElement('button');
  btn.textContent='SEARCH';
  btn.addEventListener('click',doSearch);
  bar.appendChild(input);bar.appendChild(btn);
  m.appendChild(bar);

  try{
    let papers;
    if(query){
      const data=await api(`/search/scan?q=${encodeURIComponent(query)}&limit=50`);
      papers=data.results||[];
    }else{
      const data=await api(`/papers${currentTopic?'?topic='+currentTopic:''}`);
      papers=data.papers||[];
    }
    if(!papers.length){
      const e=document.createElement('div');e.className='empty';
      e.textContent='No papers found.';m.appendChild(e);return;
    }
    const list=document.createElement('div');
    for(const p of papers){
      const item=document.createElement('div');
      item.className='paper-item';
      const title=document.createElement('div');
      title.className='title';title.textContent=normalizeTitle(p.title);
      const meta=document.createElement('div');
      meta.className='meta';
      if(p.topic){const s=document.createElement('span');s.textContent=p.topic;meta.appendChild(s);}
      if(p.year){const s=document.createElement('span');s.textContent=p.year;meta.appendChild(s);}
      if(p.doi){const s=document.createElement('span');s.textContent='DOI: '+p.doi;meta.appendChild(s);}
      item.appendChild(title);item.appendChild(meta);
      if(p.id)item.addEventListener('click',()=>showPaper(p.id));
      list.appendChild(item);
    }
    m.appendChild(list);
  }catch(e){
    const err=document.createElement('div');err.className='empty';
    err.textContent='Error loading papers: '+e.message;m.appendChild(err);
  }
}

function doSearch(){
  const q=document.getElementById('q').value.trim();
  loadPapers(q||undefined);
}

async function showPaperNoHistory(id){return _showPaper(id);}
async function showPaper(id){
  const activeBtn=document.querySelector('.nav-btn.active');
  if(activeBtn)previousView=activeBtn.dataset.view;
  history.pushState({paper:id},'',`#paper/${id}`);
  return _showPaper(id);
}
async function _showPaper(id){
  const m=document.getElementById('main');
  m.textContent='Loading...';
  try{
    const p=await api(`/papers/${encodeURIComponent(id)}`);
    m.textContent='';
    const d=document.createElement('div');d.className='detail';

    const back=document.createElement('button');
    back.className='back';back.textContent='\u2190 Back';
    back.addEventListener('click',()=>{
      if(previousView)showView(previousView);
      else showView('browse');
    });
    d.appendChild(back);

    const h2=document.createElement('h2');h2.textContent=normalizeTitle(p.title);d.appendChild(h2);

    if(p.doi){
      const a=document.createElement('a');
      a.href='https://doi.org/'+encodeURIComponent(p.doi);
      a.target='_blank';a.textContent='doi:'+p.doi;
      a.style.cssText='font-family:var(--mono);font-size:15px;color:var(--accent2);display:block;margin-bottom:16px';
      d.appendChild(a);
    }

    const metaParts=[];
    if(p.year)metaParts.push('Year: '+p.year);
    if(p.topic)metaParts.push('Topic: '+p.topic);
    if(p.tags&&p.tags.length)metaParts.push('Tags: '+p.tags.join(', '));
    if(metaParts.length){
      const md=document.createElement('div');
      md.style.cssText='font-family:var(--mono);font-size:14px;color:var(--fg2);margin-bottom:20px';
      md.textContent=metaParts.join(' \u00b7 ');d.appendChild(md);
    }

    if(p.abstract){
      const ab=document.createElement('div');ab.className='abstract';
      ab.textContent=p.abstract;d.appendChild(ab);
    }

    if(p.equations&&p.equations.length){
      const realEqs=p.equations.filter(eq=>{
        const l=(eq.latex||'').trim();
        if(l.length<15)return false;
        if(/^\^?\{?[\d,\s-]+\}?$/.test(l))return false;
        if(!l.includes('=')&&!l.includes('\\frac')&&!l.includes('\\sum')&&!l.includes('\\int'))return false;
        return true;
      });
      if(realEqs.length){
        const h3=document.createElement('h3');
        h3.style.cssText='font-family:var(--serif);font-size:20px;color:var(--accent);margin:28px 0 12px;font-weight:600';
        h3.textContent='Equations ('+realEqs.length+')';d.appendChild(h3);
        for(const eq of realEqs){
          const ei=document.createElement('div');ei.className='eq-item';
          if(eq.section){
            const sec=document.createElement('div');
            sec.style.cssText='font-family:var(--mono);font-size:12px;color:var(--fg2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px';
            sec.textContent=eq.section;
            ei.appendChild(sec);
          }
          const math=document.createElement('div');
          const label=eq.number?'('+eq.number+')\\quad ':'';
          try{
            katex.render(label+eq.latex,math,{throwOnError:false,displayMode:true});
          }catch(e){
            math.textContent=(eq.number?'('+eq.number+') ':'')+eq.latex;
          }
          ei.appendChild(math);
          d.appendChild(ei);
        }
      }
    }

    if(p.content){
      const c=document.createElement('div');c.className='content';
      // Skip header (title/authors/abstract are shown above)
      // Find first ## or # heading after initial content
      let raw=p.content;
      const introIdx=raw.search(/\n#{1,2}\s+(?:Introduction|Background|Methods|1\s|2\s)/i);
      if(introIdx>200)raw=raw.substring(introIdx);
      raw=raw.substring(0,6000)+(raw.length>6000?'\n\n*[...truncated]*':'');
      c.innerHTML=renderMarkdown(raw);
      d.appendChild(c);
    }
    m.appendChild(d);
    renderLatexInElement(d);
    colorCitations(d);
  }catch(e){
    m.textContent='Error: '+e.message;
  }
}

async function loadSessions(){
  const m=document.getElementById('main');
  m.textContent='';
  const h2=document.createElement('h2');
  h2.textContent='Research Sessions';h2.style.cssText='font-family:var(--serif);margin-bottom:24px;font-size:28px';
  m.appendChild(h2);
  try{
    const data=await api('/sessions');
    const sessions=data.sessions||[];
    if(!sessions.length){
      const e=document.createElement('div');e.className='empty';
      e.textContent='No sessions yet.';m.appendChild(e);return;
    }
    for(const s of sessions){
      const item=document.createElement('div');item.className='session-item';
      const name=document.createElement('div');
      name.style.cssText='font-weight:600;font-size:19px';name.textContent=s.name;
      const meta=document.createElement('div');
      meta.style.cssText='font-family:var(--mono);font-size:13px;color:var(--fg2);margin-top:4px';
      meta.textContent=`${s.entry_count} entries \u00b7 ${s.closed?'closed':'open'} \u00b7 ${(s.created||'').split('T')[0]}`;
      item.appendChild(name);item.appendChild(meta);
      item.style.cursor='pointer';
      item.addEventListener('click',()=>showSessionDetail(s.id));
      m.appendChild(item);
    }
  }catch(e){
    const err=document.createElement('div');err.className='empty';
    err.textContent='Error: '+e.message;m.appendChild(err);
  }
}

async function showSessionDetail(sid){
  const m=document.getElementById('main');
  m.textContent='Loading...';
  try{
    const data=await api(`/sessions/${encodeURIComponent(sid)}`);
    m.textContent='';
    const back=document.createElement('button');
    back.className='back';back.textContent='\u2190 Back to sessions';
    back.addEventListener('click',()=>showView('sessions'));
    m.appendChild(back);
    const h2=document.createElement('h2');
    h2.textContent=data.name;h2.style.cssText='font-family:var(--serif);font-size:28px;margin-bottom:8px';m.appendChild(h2);
    const status=document.createElement('div');
    status.style.cssText='font-family:var(--mono);font-size:13px;color:var(--fg2);margin-bottom:24px';
    status.textContent=`${data.entries.length} entries \u00b7 ${data.closed?'closed':'open'} \u00b7 ${(data.created||'').split('T')[0]}`;
    m.appendChild(status);
    if(!data.entries.length){
      const e=document.createElement('div');e.className='empty';
      e.textContent='No entries yet.';m.appendChild(e);return;
    }
    for(const entry of data.entries){
      const card=document.createElement('div');
      card.style.cssText='padding:16px 20px;background:var(--card);border-radius:8px;margin:10px 0;border-left:4px solid var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.04)';
      const agent=document.createElement('div');
      agent.style.cssText='font-family:var(--mono);font-size:13px;color:var(--accent2);margin-bottom:6px';
      agent.textContent=`${entry.agent} \u00b7 ${(entry.timestamp||'').split('T')[0]}`;
      const content=document.createElement('div');
      content.style.fontSize='17px';
      content.textContent=entry.content;
      card.appendChild(agent);card.appendChild(content);
      if(entry.tags&&entry.tags.length){
        const tags=document.createElement('div');
        tags.style.cssText='font-family:var(--mono);font-size:12px;color:var(--fg2);margin-top:6px';
        tags.textContent='tags: '+entry.tags.join(', ');
        card.appendChild(tags);
      }
      m.appendChild(card);
    }
  }catch(e){m.textContent='Error: '+e.message;}
}

function showCiteView(){
  const m=document.getElementById('main');m.textContent='';
  const h2=document.createElement('h2');
  h2.textContent='Find References';h2.style.cssText='font-family:var(--serif);font-size:28px;margin-bottom:8px';m.appendChild(h2);
  const desc=document.createElement('p');
  desc.style.cssText='color:var(--fg2);font-size:17px;margin-bottom:20px;line-height:1.6';
  desc.textContent='Type a claim and find supporting papers from your KB. If coverage is thin, searches OpenAlex automatically.';
  m.appendChild(desc);
  const bar=document.createElement('div');bar.className='search-bar';
  const input=document.createElement('textarea');
  input.id='cite-q';input.placeholder='e.g., SWAT+ has been widely used for watershed modeling...';
  input.style.cssText='flex:1;background:var(--card);border:1px solid var(--border);color:var(--fg);padding:14px 18px;font-family:var(--body);font-size:18px;border-radius:8px;outline:none;resize:vertical;min-height:70px;box-shadow:0 1px 3px rgba(0,0,0,.04)';
  const btn=document.createElement('button');btn.textContent='CITE';
  btn.addEventListener('click',doCite);
  bar.appendChild(input);bar.appendChild(btn);m.appendChild(bar);
  const result=document.createElement('div');result.id='cite-result';m.appendChild(result);
}

async function doCite(){
  const q=document.getElementById('cite-q').value.trim();
  if(!q)return;
  const el=document.getElementById('cite-result');
  el.textContent='Searching KB and external APIs...';
  try{
    const r=await fetch(API+'/analysis/auto-cite',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({claim:q,max_ingest:0})
    });
    el.textContent='';
    if(!r.ok){el.textContent='Search failed.';return;}
    const d=await r.json();

    if(d.total===0){el.textContent='No references found.';return;}

    if(d.kb_refs&&d.kb_refs.length){
      const h3=document.createElement('h3');
      h3.style.cssText='font-family:var(--serif);font-size:20px;color:var(--accent);margin:20px 0 10px;font-weight:600';
      h3.textContent='From Knowledge Base ('+d.kb_refs.length+')';
      el.appendChild(h3);
      for(const ref of d.kb_refs){
        const card=document.createElement('div');
        card.style.cssText='padding:14px 18px;background:var(--card);border-radius:8px;margin:8px 0;border-left:4px solid var(--accent2);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .12s';
        const title=document.createElement('div');
        title.style.cssText='font-weight:600;font-size:18px';title.textContent=normalizeTitle(ref.title);
        const meta=document.createElement('div');
        meta.style.cssText='font-family:var(--mono);font-size:13px;color:var(--fg2);margin-top:4px';
        const parts=[];
        if(ref.topic)parts.push(ref.topic);
        if(ref.doi)parts.push('doi:'+ref.doi);
        meta.textContent=parts.join(' \u00b7 ');
        card.appendChild(title);card.appendChild(meta);
        if(ref.path){
          card.addEventListener('click',()=>{
            fetch(API+'/papers').then(r=>r.json()).then(data=>{
              const match=(data.papers||[]).find(p=>p.path===ref.path);
              if(match)showPaper(match.id);
            });
          });
        }
        el.appendChild(card);
      }
    }

    if(d.external_only&&d.external_only.length){
      const h3=document.createElement('h3');
      h3.style.cssText='font-family:var(--serif);font-size:18px;color:var(--fg2);margin:20px 0 10px';
      h3.textContent='External ('+d.external_only.length+')';
      el.appendChild(h3);
      for(const ref of d.external_only){
        const card=document.createElement('div');
        card.style.cssText='padding:12px 18px;background:var(--bg2);border-radius:8px;margin:6px 0;font-size:17px';
        const title=document.createElement('div');
        title.textContent=normalizeTitle(ref.title);
        const meta=document.createElement('div');
        meta.style.cssText='font-family:var(--mono);font-size:13px;color:var(--fg2)';
        if(ref.doi)meta.textContent='doi:'+ref.doi;
        card.appendChild(title);card.appendChild(meta);
        el.appendChild(card);
      }
    }

    if(d.newly_ingested&&d.newly_ingested.length){
      const h3=document.createElement('h3');
      h3.style.cssText='font-family:var(--serif);font-size:18px;color:var(--accent);margin:20px 0 10px';
      h3.textContent='Auto-ingested ('+d.newly_ingested.length+')';
      el.appendChild(h3);
      for(const ref of d.newly_ingested){
        const card=document.createElement('div');
        card.style.cssText='padding:12px 18px;background:var(--card);border-radius:8px;margin:6px 0;border-left:4px solid var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.04)';
        const title=document.createElement('div');
        title.style.cssText='font-weight:600;font-size:17px';title.textContent=normalizeTitle(ref.title)+' (newly added to KB)';
        card.appendChild(title);
        el.appendChild(card);
      }
    }

    const total=document.createElement('div');
    total.style.cssText='font-family:var(--mono);font-size:13px;color:var(--fg2);margin-top:20px';
    total.textContent=d.total+' reference(s) found';
    el.appendChild(total);
  }catch(e){el.textContent='Error: '+e.message;}
}

function showExplainView(){
  const m=document.getElementById('main');m.textContent='';
  const h2=document.createElement('h2');
  h2.textContent='Explain Parameter';h2.style.cssText='font-family:var(--serif);font-size:28px;margin-bottom:24px';m.appendChild(h2);
  const bar=document.createElement('div');bar.className='search-bar';
  const input=document.createElement('input');
  input.id='explain-q';input.placeholder='CN2, ESCO, alpha_bf, KGE...';
  input.addEventListener('keydown',e=>{if(e.key==='Enter')doExplain();});
  const btn=document.createElement('button');btn.textContent='EXPLAIN';
  btn.addEventListener('click',doExplain);
  bar.appendChild(input);bar.appendChild(btn);m.appendChild(bar);
  const result=document.createElement('div');result.id='explain-result';m.appendChild(result);
}

async function doExplain(){
  const q=document.getElementById('explain-q').value.trim();
  if(!q)return;
  const el=document.getElementById('explain-result');
  el.textContent='Looking up...';
  try{
    const r=await fetch(API+'/analysis/explain',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({concept:q})
    });
    el.textContent='';
    if(!r.ok){el.textContent='No explanation found for "'+q+'".';return;}
    const d=await r.json();
    const box=document.createElement('div');box.className='explain-box';
    const h3=document.createElement('h3');h3.textContent=d.name;box.appendChild(h3);
    const p=document.createElement('p');p.style.cssText='font-size:18px;line-height:1.8';
    p.innerHTML=renderMarkdown(d.definition);box.appendChild(p);renderLatexInElement(p);
    if(d.range){
      const rng=document.createElement('div');rng.className='range';
      rng.textContent=`Range: ${d.range[0]} \u2013 ${d.range[1]}${d.unit?' '+d.unit:''}`;
      box.appendChild(rng);
    }
    if(d.related&&d.related.length){
      const rel=document.createElement('div');
      rel.style.cssText='margin-top:10px;font-size:16px;color:var(--fg2)';
      rel.textContent='Related: '+d.related.join(', ');box.appendChild(rel);
    }
    if(d.ref){
      const ref=document.createElement('div');ref.className='ref';
      ref.textContent=d.ref;box.appendChild(ref);
    }
    const src=document.createElement('div');
    src.style.cssText='font-family:var(--mono);font-size:12px;color:var(--fg2);margin-top:10px';
    src.textContent='source: '+d.source;box.appendChild(src);
    el.appendChild(box);
  }catch(e){el.textContent='Error: '+e.message;}
}

// Text selection → search popup
let selPopup=null;
document.addEventListener('mouseup',function(e){
  if(selPopup){selPopup.remove();selPopup=null;}
  // Don't show on buttons/inputs
  if(e.target.closest('button,input,textarea,.search-bar,.cite-link'))return;
  // Delay to let selection finalize
  setTimeout(()=>{
    const sel=window.getSelection();
    const text=(sel&&sel.toString()||'').trim();
    if(text.length<3||text.length>200)return;
    if(!sel.rangeCount)return;

    const range=sel.getRangeAt(0);
    const rect=range.getBoundingClientRect();
    if(rect.width===0)return;

  selPopup=document.createElement('div');
  selPopup.style.cssText='position:fixed;z-index:1000;display:flex;gap:6px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);font-size:14px;font-family:var(--mono)';
  selPopup.style.left=rect.left+'px';
  selPopup.style.top=(rect.bottom+6)+'px';

  const searchBtn=document.createElement('button');
  searchBtn.textContent='Search KB';
  searchBtn.style.cssText='background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:13px';
  searchBtn.addEventListener('click',()=>{
    selPopup.remove();selPopup=null;
    previousView='browse';
    loadPapers(text);
    setActiveNav('browse');
  });

  const citeBtn=document.createElement('button');
  citeBtn.textContent='Find Refs';
  citeBtn.style.cssText='background:var(--accent2);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:13px';
  citeBtn.addEventListener('click',()=>{
    selPopup.remove();selPopup=null;
    showCiteView();
    setActiveNav('cite');
    setTimeout(()=>{
      const cq=document.getElementById('cite-q');
      if(cq){cq.value=text;doCite();}
    },100);
  });

  const explainBtn=document.createElement('button');
  explainBtn.textContent='Explain';
  explainBtn.style.cssText='background:var(--bg3);color:var(--fg);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:13px';
  explainBtn.addEventListener('click',()=>{
    selPopup.remove();selPopup=null;
    showExplainView();
    setActiveNav('explain');
    setTimeout(()=>{
      const eq=document.getElementById('explain-q');
      if(eq){eq.value=text;doExplain();}
    },100);
  });

  selPopup.appendChild(searchBtn);
  selPopup.appendChild(citeBtn);
  selPopup.appendChild(explainBtn);
  document.body.appendChild(selPopup);
  },50);
});

document.addEventListener('mousedown',function(e){
  if(selPopup&&!selPopup.contains(e.target)){
    selPopup.remove();selPopup=null;
  }
});

init().catch(()=>{
  const m=document.getElementById('main');
  m.textContent='';
  const e=document.createElement('div');e.className='empty';
  e.textContent='Failed to connect to API. Start the server: papermind --kb ~/kb serve --http';
  m.appendChild(e);
});
</script>
