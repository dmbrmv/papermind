<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperMind</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--bg2:#161822;--bg3:#1c1f2e;
  --fg:#eef0f5;--fg2:#b8bcc8;--accent:#e0b87a;--accent2:#8db5e0;
  --border:#252838;--hover:#1f2336;
  --serif:'Crimson Pro',Georgia,serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--serif);background:var(--bg);color:var(--fg);line-height:1.6;min-height:100vh;font-size:16px;font-weight:400;-webkit-font-smoothing:antialiased}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr;height:100vh}
header{grid-column:1/-1;padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;background:var(--bg2)}
header h1{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
header .stats{font-family:var(--mono);font-size:11px;color:var(--fg2);margin-left:auto}

.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:16px;overflow-y:auto}
.sidebar h3{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--fg2);margin:16px 0 8px}
.topic{display:block;padding:5px 10px;font-size:14px;color:var(--fg2);cursor:pointer;border-radius:4px;border:none;background:none;width:100%;text-align:left;font-family:var(--serif)}
.topic:hover,.topic.active{background:var(--hover);color:var(--fg)}
.topic.active{border-left:2px solid var(--accent);padding-left:8px}
.topic .count{float:right;font-family:var(--mono);font-size:11px;color:var(--fg2)}
.nav-btn{display:block;padding:8px 10px;font-size:14px;color:var(--fg2);cursor:pointer;border-radius:4px;border:none;background:none;width:100%;text-align:left;font-family:var(--serif)}
.nav-btn:hover{background:var(--hover);color:var(--fg)}
.nav-btn.active{color:var(--accent)}

main{overflow-y:auto;padding:24px 32px}
.search-bar{display:flex;gap:8px;margin-bottom:24px}
.search-bar input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--fg);padding:10px 14px;font-family:var(--serif);font-size:15px;border-radius:4px;outline:none}
.search-bar input:focus{border-color:var(--accent2)}
.search-bar button{background:var(--accent2);color:var(--bg);border:none;padding:10px 18px;font-family:var(--mono);font-size:12px;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}

.paper-item{padding:14px 16px;border-radius:4px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.paper-item:hover{background:var(--hover);border-left-color:var(--accent2)}
.paper-item .title{font-size:16px;font-weight:600;margin-bottom:4px}
.paper-item .meta{font-family:var(--mono);font-size:12px;color:var(--fg2)}
.paper-item .meta span{margin-right:12px}

.detail{max-width:720px}
.detail .back{font-family:var(--mono);font-size:11px;color:var(--fg2);cursor:pointer;margin-bottom:16px;display:inline-block;border:none;background:none}
.detail .back:hover{color:var(--accent)}
.detail h2{font-size:26px;font-weight:600;line-height:1.3;margin-bottom:12px}
.detail .abstract{font-style:italic;color:var(--fg);margin-bottom:20px;padding:16px;background:var(--bg2);border-radius:4px;border-left:3px solid var(--accent)}
.detail .content{white-space:pre-wrap;font-size:16px;line-height:1.8;color:var(--fg)}
.eq-item{font-family:var(--mono);font-size:14px;padding:10px 14px;background:var(--bg3);border-radius:4px;margin:4px 0;overflow-x:auto;color:var(--fg)}

.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:20px;text-align:center}
.stat-card .number{font-family:var(--mono);font-size:32px;font-weight:500;color:var(--accent)}
.stat-card .label{font-size:12px;color:var(--fg2);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

.session-item{padding:12px 16px;background:var(--bg2);border-radius:4px;margin:8px 0;border-left:3px solid var(--accent2)}
.explain-box{margin-top:24px;padding:20px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)}
.explain-box h3{font-size:18px;color:var(--accent);margin-bottom:8px}
.explain-box .range{font-family:var(--mono);font-size:13px;color:var(--accent2)}
.explain-box .ref{font-size:12px;color:var(--fg2);margin-top:8px;font-style:italic}

@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  main{padding:16px}
}
.empty{text-align:center;padding:60px 20px;color:var(--fg2);font-style:italic}
.loading{text-align:center;padding:40px;color:var(--fg2);font-family:var(--mono);font-size:12px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>PaperMind</h1>
    <div class="stats" id="header-stats"></div>
  </header>
  <div class="sidebar">
    <h3>Views</h3>
    <button class="nav-btn active" data-view="browse">Browse Papers</button>
    <button class="nav-btn" data-view="cite">Cite</button>
    <button class="nav-btn" data-view="sessions">Sessions</button>
    <button class="nav-btn" data-view="explain">Explain</button>
    <h3>Topics</h3>
    <div id="topic-list"></div>
  </div>
  <main id="main"></main>
</div>
<script>
const API='/api/v1';
let currentTopic='',topics={};

function esc(s){
  if(!s)return '';
  const d=document.createElement('div');
  d.textContent=String(s);
  return d.innerHTML;
}

function setHTML(el,html){
  // Using DOMParser for safer HTML insertion from our own templates
  if(typeof el==='string')el=document.getElementById(el);
  el.innerHTML='';
  const t=document.createElement('template');
  t.innerHTML=html;
  el.appendChild(t.content.cloneNode(true));
}

async function api(path,opts){
  const r=await fetch(API+path,opts);
  if(!r.ok)throw new Error(r.statusText);
  return r.json();
}

async function init(){
  // Wire nav buttons
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.addEventListener('click',()=>showView(b.dataset.view));
  });
  const[stats]=await Promise.all([api('/stats')]);
  topics=stats.topics||{};
  document.getElementById('header-stats').textContent=
    `${stats.papers} papers | ${stats.packages} pkgs | ${stats.codebases} codebases`;
  renderTopics();
  showView('browse');
}

function renderTopics(){
  const el=document.getElementById('topic-list');
  el.textContent='';
  Object.entries(topics).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{
    const btn=document.createElement('button');
    btn.className='topic'+(currentTopic===t?' active':'');
    btn.textContent=t;
    const span=document.createElement('span');
    span.className='count';
    span.textContent=c;
    btn.appendChild(span);
    btn.addEventListener('click',()=>{
      currentTopic=currentTopic===t?'':t;
      renderTopics();
      loadPapers();
    });
    el.appendChild(btn);
  });
}

function setActiveNav(view){
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.view===view);
  });
}

async function showView(view){
  setActiveNav(view);
  if(view==='browse')await loadPapers();
  else if(view==='cite')showCiteView();
  else if(view==='sessions')await loadSessions();
  else if(view==='explain')showExplainView();
}

async function loadPapers(query){
  const m=document.getElementById('main');
  m.textContent='';

  // Search bar
  const bar=document.createElement('div');
  bar.className='search-bar';
  const input=document.createElement('input');
  input.id='q';input.placeholder='Search papers...';
  input.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  const btn=document.createElement('button');
  btn.textContent='SEARCH';
  btn.addEventListener('click',doSearch);
  bar.appendChild(input);bar.appendChild(btn);
  m.appendChild(bar);

  try{
    let papers;
    if(query){
      const data=await api(`/search/scan?q=${encodeURIComponent(query)}&limit=50`);
      papers=data.results||[];
    }else{
      const data=await api(`/papers${currentTopic?'?topic='+currentTopic:''}`);
      papers=data.papers||[];
    }
    if(!papers.length){
      const e=document.createElement('div');e.className='empty';
      e.textContent='No papers found.';m.appendChild(e);return;
    }
    const list=document.createElement('div');
    for(const p of papers){
      const item=document.createElement('div');
      item.className='paper-item';
      const title=document.createElement('div');
      title.className='title';title.textContent=p.title||'Untitled';
      const meta=document.createElement('div');
      meta.className='meta';
      if(p.topic){const s=document.createElement('span');s.textContent=p.topic;meta.appendChild(s);}
      if(p.year){const s=document.createElement('span');s.textContent=p.year;meta.appendChild(s);}
      if(p.doi){const s=document.createElement('span');s.textContent='DOI: '+p.doi;meta.appendChild(s);}
      item.appendChild(title);item.appendChild(meta);
      if(p.id)item.addEventListener('click',()=>showPaper(p.id));
      list.appendChild(item);
    }
    m.appendChild(list);
  }catch(e){
    const err=document.createElement('div');err.className='empty';
    err.textContent='Error loading papers: '+e.message;m.appendChild(err);
  }
}

function doSearch(){
  const q=document.getElementById('q').value.trim();
  loadPapers(q||undefined);
}

async function showPaper(id){
  const m=document.getElementById('main');
  m.textContent='Loading...';
  try{
    const p=await api(`/papers/${encodeURIComponent(id)}`);
    m.textContent='';
    const d=document.createElement('div');d.className='detail';

    const back=document.createElement('button');
    back.className='back';back.textContent='\u2190 Back to list';
    back.addEventListener('click',()=>showView('browse'));
    d.appendChild(back);

    const h2=document.createElement('h2');h2.textContent=p.title||'Untitled';d.appendChild(h2);

    if(p.doi){
      const a=document.createElement('a');
      a.href='https://doi.org/'+encodeURIComponent(p.doi);
      a.target='_blank';a.textContent='doi:'+p.doi;
      a.style.cssText='font-family:var(--mono);font-size:12px;color:var(--accent2);display:block;margin-bottom:16px';
      d.appendChild(a);
    }

    const metaParts=[];
    if(p.year)metaParts.push('Year: '+p.year);
    if(p.topic)metaParts.push('Topic: '+p.topic);
    if(p.tags&&p.tags.length)metaParts.push('Tags: '+p.tags.join(', '));
    if(metaParts.length){
      const md=document.createElement('div');
      md.style.cssText='font-family:var(--mono);font-size:12px;color:var(--fg2);margin-bottom:16px';
      md.textContent=metaParts.join(' \u00b7 ');d.appendChild(md);
    }

    if(p.abstract){
      const ab=document.createElement('div');ab.className='abstract';
      ab.textContent=p.abstract;d.appendChild(ab);
    }

    if(p.equations&&p.equations.length){
      const h3=document.createElement('h3');
      h3.style.cssText='font-size:14px;color:var(--accent);margin:20px 0 8px';
      h3.textContent='Equations';d.appendChild(h3);
      for(const eq of p.equations){
        const ei=document.createElement('div');ei.className='eq-item';
        ei.textContent=(eq.number?'('+eq.number+') ':'')+eq.latex;
        d.appendChild(ei);
      }
    }

    if(p.content){
      const c=document.createElement('div');c.className='content';
      c.textContent=p.content.substring(0,3000)+(p.content.length>3000?'\n\n[...truncated]':'');
      d.appendChild(c);
    }
    m.appendChild(d);
  }catch(e){
    m.textContent='Error: '+e.message;
  }
}

async function loadSessions(){
  const m=document.getElementById('main');
  m.textContent='';
  const h2=document.createElement('h2');
  h2.textContent='Research Sessions';h2.style.marginBottom='20px';
  m.appendChild(h2);
  try{
    const data=await api('/sessions');
    const sessions=data.sessions||[];
    if(!sessions.length){
      const e=document.createElement('div');e.className='empty';
      e.textContent='No sessions yet.';m.appendChild(e);return;
    }
    for(const s of sessions){
      const item=document.createElement('div');item.className='session-item';
      const name=document.createElement('div');
      name.style.fontWeight='600';name.textContent=s.name;
      const meta=document.createElement('div');
      meta.style.cssText='font-family:var(--mono);font-size:11px;color:var(--fg2)';
      meta.textContent=`${s.entry_count} entries \u00b7 ${s.closed?'closed':'open'} \u00b7 ${(s.created||'').split('T')[0]}`;
      item.appendChild(name);item.appendChild(meta);
      item.style.cursor='pointer';
      item.addEventListener('click',()=>showSessionDetail(s.id));
      m.appendChild(item);
    }
  }catch(e){
    const err=document.createElement('div');err.className='empty';
    err.textContent='Error: '+e.message;m.appendChild(err);
  }
}

async function showSessionDetail(sid){
  const m=document.getElementById('main');
  m.textContent='Loading...';
  try{
    const data=await api(`/sessions/${encodeURIComponent(sid)}`);
    m.textContent='';
    const back=document.createElement('button');
    back.className='back';back.textContent='\u2190 Back to sessions';
    back.style.cssText='font-family:var(--mono);font-size:11px;color:var(--fg2);cursor:pointer;border:none;background:none;margin-bottom:16px;display:block';
    back.addEventListener('click',()=>showView('sessions'));
    m.appendChild(back);
    const h2=document.createElement('h2');
    h2.textContent=data.name;h2.style.marginBottom='8px';m.appendChild(h2);
    const status=document.createElement('div');
    status.style.cssText='font-family:var(--mono);font-size:11px;color:var(--fg2);margin-bottom:20px';
    status.textContent=`${data.entries.length} entries \u00b7 ${data.closed?'closed':'open'} \u00b7 ${(data.created||'').split('T')[0]}`;
    m.appendChild(status);
    if(!data.entries.length){
      const e=document.createElement('div');e.className='empty';
      e.textContent='No entries yet.';m.appendChild(e);return;
    }
    for(const entry of data.entries){
      const card=document.createElement('div');
      card.style.cssText='padding:12px 16px;background:var(--bg2);border-radius:4px;margin:8px 0;border-left:3px solid var(--accent)';
      const agent=document.createElement('div');
      agent.style.cssText='font-family:var(--mono);font-size:11px;color:var(--accent2);margin-bottom:4px';
      agent.textContent=`${entry.agent} \u00b7 ${(entry.timestamp||'').split('T')[0]}`;
      const content=document.createElement('div');
      content.textContent=entry.content;
      card.appendChild(agent);card.appendChild(content);
      if(entry.tags&&entry.tags.length){
        const tags=document.createElement('div');
        tags.style.cssText='font-family:var(--mono);font-size:10px;color:var(--fg2);margin-top:4px';
        tags.textContent='tags: '+entry.tags.join(', ');
        card.appendChild(tags);
      }
      m.appendChild(card);
    }
  }catch(e){m.textContent='Error: '+e.message;}
}

function showCiteView(){
  const m=document.getElementById('main');m.textContent='';
  const h2=document.createElement('h2');
  h2.textContent='Find References';h2.style.marginBottom='8px';m.appendChild(h2);
  const desc=document.createElement('p');
  desc.style.cssText='color:var(--fg2);font-size:14px;margin-bottom:16px';
  desc.textContent='Type a claim and find supporting papers from your KB. If coverage is thin, searches OpenAlex automatically.';
  m.appendChild(desc);
  const bar=document.createElement('div');bar.className='search-bar';
  const input=document.createElement('textarea');
  input.id='cite-q';input.placeholder='e.g., SWAT+ has been widely used for watershed modeling...';
  input.style.cssText='flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--fg);padding:10px 14px;font-family:var(--serif);font-size:15px;border-radius:4px;outline:none;resize:vertical;min-height:60px';
  const btn=document.createElement('button');btn.textContent='CITE';
  btn.addEventListener('click',doCite);
  bar.appendChild(input);bar.appendChild(btn);m.appendChild(bar);
  const result=document.createElement('div');result.id='cite-result';m.appendChild(result);
}

async function doCite(){
  const q=document.getElementById('cite-q').value.trim();
  if(!q)return;
  const el=document.getElementById('cite-result');
  el.textContent='Searching KB and external APIs...';
  try{
    const r=await fetch(API+'/analysis/auto-cite',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({claim:q,max_ingest:0})
    });
    el.textContent='';
    if(!r.ok){el.textContent='Search failed.';return;}
    const d=await r.json();

    if(d.total===0){el.textContent='No references found.';return;}

    // KB refs
    if(d.kb_refs&&d.kb_refs.length){
      const h3=document.createElement('h3');
      h3.style.cssText='font-size:14px;color:var(--accent);margin:16px 0 8px';
      h3.textContent='From Knowledge Base ('+d.kb_refs.length+')';
      el.appendChild(h3);
      for(const ref of d.kb_refs){
        const card=document.createElement('div');
        card.style.cssText='padding:12px 16px;background:var(--bg2);border-radius:4px;margin:6px 0;border-left:3px solid var(--accent2);cursor:pointer';
        const title=document.createElement('div');
        title.style.fontWeight='600';title.textContent=ref.title;
        const meta=document.createElement('div');
        meta.style.cssText='font-family:var(--mono);font-size:11px;color:var(--fg2);margin-top:4px';
        const parts=[];
        if(ref.topic)parts.push(ref.topic);
        if(ref.doi)parts.push('doi:'+ref.doi);
        meta.textContent=parts.join(' \u00b7 ');
        card.appendChild(title);card.appendChild(meta);
        if(ref.path){
          // Find paper ID from path for click-through
          card.addEventListener('click',()=>{
            // Try to extract ID from the catalog
            fetch(API+'/papers').then(r=>r.json()).then(data=>{
              const match=(data.papers||[]).find(p=>p.path===ref.path);
              if(match)showPaper(match.id);
            });
          });
        }
        el.appendChild(card);
      }
    }

    // External refs
    if(d.external_only&&d.external_only.length){
      const h3=document.createElement('h3');
      h3.style.cssText='font-size:14px;color:var(--fg2);margin:16px 0 8px';
      h3.textContent='External ('+d.external_only.length+')';
      el.appendChild(h3);
      for(const ref of d.external_only){
        const card=document.createElement('div');
        card.style.cssText='padding:10px 16px;background:var(--bg3);border-radius:4px;margin:4px 0';
        const title=document.createElement('div');
        title.textContent=ref.title;
        const meta=document.createElement('div');
        meta.style.cssText='font-family:var(--mono);font-size:11px;color:var(--fg2)';
        if(ref.doi)meta.textContent='doi:'+ref.doi;
        card.appendChild(title);card.appendChild(meta);
        el.appendChild(card);
      }
    }

    // Newly ingested
    if(d.newly_ingested&&d.newly_ingested.length){
      const h3=document.createElement('h3');
      h3.style.cssText='font-size:14px;color:var(--accent);margin:16px 0 8px';
      h3.textContent='Auto-ingested ('+d.newly_ingested.length+')';
      el.appendChild(h3);
      for(const ref of d.newly_ingested){
        const card=document.createElement('div');
        card.style.cssText='padding:10px 16px;background:var(--bg2);border-radius:4px;margin:4px 0;border-left:3px solid var(--accent)';
        const title=document.createElement('div');
        title.style.fontWeight='600';title.textContent=ref.title+' (newly added to KB)';
        card.appendChild(title);
        el.appendChild(card);
      }
    }

    const total=document.createElement('div');
    total.style.cssText='font-family:var(--mono);font-size:11px;color:var(--fg2);margin-top:16px';
    total.textContent=d.total+' reference(s) found';
    el.appendChild(total);
  }catch(e){el.textContent='Error: '+e.message;}
}

function showExplainView(){
  const m=document.getElementById('main');m.textContent='';
  const h2=document.createElement('h2');
  h2.textContent='Explain Parameter';h2.style.marginBottom='20px';m.appendChild(h2);
  const bar=document.createElement('div');bar.className='search-bar';
  const input=document.createElement('input');
  input.id='explain-q';input.placeholder='CN2, ESCO, alpha_bf, KGE...';
  input.addEventListener('keydown',e=>{if(e.key==='Enter')doExplain();});
  const btn=document.createElement('button');btn.textContent='EXPLAIN';
  btn.addEventListener('click',doExplain);
  bar.appendChild(input);bar.appendChild(btn);m.appendChild(bar);
  const result=document.createElement('div');result.id='explain-result';m.appendChild(result);
}

async function doExplain(){
  const q=document.getElementById('explain-q').value.trim();
  if(!q)return;
  const el=document.getElementById('explain-result');
  el.textContent='Looking up...';
  try{
    const r=await fetch(API+'/analysis/explain',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({concept:q})
    });
    el.textContent='';
    if(!r.ok){el.textContent='No explanation found for "'+q+'".';return;}
    const d=await r.json();
    const box=document.createElement('div');box.className='explain-box';
    const h3=document.createElement('h3');h3.textContent=d.name;box.appendChild(h3);
    const p=document.createElement('p');p.textContent=d.definition;box.appendChild(p);
    if(d.range){
      const rng=document.createElement('div');rng.className='range';
      rng.textContent=`Range: ${d.range[0]} \u2013 ${d.range[1]}${d.unit?' '+d.unit:''}`;
      box.appendChild(rng);
    }
    if(d.related&&d.related.length){
      const rel=document.createElement('div');
      rel.style.cssText='margin-top:8px;font-size:13px';
      rel.textContent='Related: '+d.related.join(', ');box.appendChild(rel);
    }
    if(d.ref){
      const ref=document.createElement('div');ref.className='ref';
      ref.textContent=d.ref;box.appendChild(ref);
    }
    const src=document.createElement('div');
    src.style.cssText='font-family:var(--mono);font-size:10px;color:var(--fg2);margin-top:8px';
    src.textContent='source: '+d.source;box.appendChild(src);
    el.appendChild(box);
  }catch(e){el.textContent='Error: '+e.message;}
}

init().catch(()=>{
  const m=document.getElementById('main');
  m.textContent='';
  const e=document.createElement('div');e.className='empty';
  e.textContent='Failed to connect to API. Start the server: papermind --kb ~/kb serve --http';
  m.appendChild(e);
});
</script>
</body>
</html>
